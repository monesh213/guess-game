<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Number Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      background: white;
      padding: 30px;
      width: 350px;
      text-align: center;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #ddd;
      outline: none;
      margin-bottom: 15px;
      text-align: center;
    }

    input:focus {
      border-color: #667eea;
    }

    button {
      width: 85%;
      padding: 12px;
      font-size: 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #4c5bd4;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      padding: 10px;
      border-radius: 8px;
    }

    .right {
      background: #d4edda;
      color: #155724;
    }

    .wrong {
      background: #f8d7da;
      color: #721c24;
    }

    #Score {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎯 Guess the Number (1 - 10)</h1>

    <input id="guessnumber" type="number" placeholder="Enter your number">

    <button onclick="checknumber()">CHECK</button>

    <p id="result">Your Result</p>
    <p id="Score">Your Score: 10</p>

    <div class="footer">
      
    </div>
  </div>


  <script>
    var guessnumber = document.getElementById("guessnumber");
    var result = document.getElementById("result");
    var Score = document.getElementById("Score");

    var randomnumber = Math.floor(Math.random() * 10) + 1;
    var totalscore = 10;

    function checknumber() {
      var enterednumber = guessnumber.value;

      if (enterednumber == "") {
        result.textContent = "⚠ Please enter a number!";
        result.className = "wrong";
        return;
      }

      if (randomnumber == enterednumber) {
        result.textContent = "✅ RIGHT! You Won 🎉";
        result.className = "right";
        alert("YOU WON 🎉");
      } else {
        totalscore = totalscore - 1;
        Score.textContent = "Your Score: " + totalscore;

        result.textContent = "❌ WRONG! Try Again";
        result.className = "wrong";

        if (totalscore == 0) {
          alert("Game Over 😢 Your score is 0");
          result.textContent = "💀 Game Over! Refresh to play again.";
          result.className = "wrong";
        }
      }

      guessnumber.value = "";
    }
  </script>

</body>
</html>
